<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Persona Frame</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #07070d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* ── HEADER ──────────────────────────────────── */
    .header { text-align: center; margin-bottom: 64px; }

    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #c8a86b;
      display: block;
      margin-bottom: 20px;
    }

    .project-name {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      color: #fff;
      display: block;
    }

    .tagline {
      margin-top: 16px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;
    }

    /* ── TABLE OF CONTENTS ───────────────────────── */
    .toc {
      width: min(560px, 90vw);
      display: flex;
      flex-direction: column;
    }

    .toc-item {
      display: grid;
      grid-template-columns: 52px 1fr;
      align-items: center;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.3s cubic-bezier(.4,0,.2,1);
      position: relative;
    }
    .toc-item:first-child { border-top: 1px solid rgba(255, 255, 255, 0.07); }

    .toc-item:hover { padding-left: 8px; }

    /* accent line on hover */
    .toc-item::before {
      content: '';
      position: absolute;
      left: -1px; top: 0; bottom: 0;
      width: 2px;
      background: #c8a86b;
      transform: scaleY(0);
      transform-origin: center;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }
    .toc-item:hover::before { transform: scaleY(1); }

    .toc-num {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(200, 168, 107, 0.5);
      font-variant-numeric: tabular-nums;
    }

    .toc-info { display: flex; flex-direction: column; gap: 5px; }

    .toc-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: rgba(255, 255, 255, 0.85);
      transition: color 0.25s;
    }
    .toc-item:hover .toc-title { color: #fff; }

    .toc-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.5px;
    }

    .toc-arrow {
      position: absolute;
      right: 0;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.15);
      transition: color 0.25s, transform 0.3s;
    }
    .toc-item:hover .toc-arrow { color: rgba(200,168,107,.6); transform: translateX(4px); }

    /* ── FADE-IN ON LOAD ─────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .header   { animation: fadeUp .7s cubic-bezier(.4,0,.2,1) both; }
    .toc-item { opacity: 0; animation: fadeUp .6s cubic-bezier(.4,0,.2,1) both; }
    .toc-item:nth-child(1) { animation-delay: .15s; }
    .toc-item:nth-child(2) { animation-delay: .28s; }
    .toc-item:nth-child(3) { animation-delay: .41s; }
    .toc-item:nth-child(4) { animation-delay: .54s; }
  </style>
</head>
<body>

  <div class="header">
    <span class="brand">Persona Frame</span>
    <span class="project-name">목차</span>
    <p class="tagline">나만의 비서(AI agent)가 탑재된 디지털 액자</p>
  </div>

  <nav class="toc">
    <a href="features.html" class="toc-item">
      <span class="toc-num">01</span>
      <div class="toc-info">
        <span class="toc-title">기능</span>
        <span class="toc-desc">주요 기능 및 인터렉션 시연</span>
      </div>
      <span class="toc-arrow">→</span>
    </a>

    <a href="serviceFlow.html" class="toc-item">
      <span class="toc-num">02</span>
      <div class="toc-info">
        <span class="toc-title">서비스 플로우</span>
        <span class="toc-desc">사용자 관점의 서비스 경험 흐름</span>
      </div>
      <span class="toc-arrow">→</span>
    </a>

    <a href="logicalArchitecture.html" class="toc-item">
      <span class="toc-num">03</span>
      <div class="toc-info">
        <span class="toc-title">논리적 아키텍처</span>
        <span class="toc-desc">AI 처리 흐름 및 데이터 동기화 설계</span>
      </div>
      <span class="toc-arrow">→</span>
    </a>
  </nav>

</body>
</html>
